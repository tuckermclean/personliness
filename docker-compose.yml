services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: personliness
      POSTGRES_USER: personliness
      POSTGRES_PASSWORD: personliness
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: .
    command: /entrypoint.sh
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DEBUG: "True"
      DJANGO_SECRET_KEY: "django-insecure-personliness-secret-key-for-development-only"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0"
      POSTGRES_DB: personliness
      POSTGRES_USER: personliness
      POSTGRES_PASSWORD: personliness
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/0"
      ADMIN_API_KEY: "your-admin-api-key-here"
      LLM_API_KEY: "${LLM_API_KEY}"
      LLM_MODEL: "o3"
      CREATE_SUPERUSER: "true"
    depends_on:
      - db
      - redis
    restart: unless-stopped

  worker:
    build: .
    command: celery -A personliness worker --loglevel=info
    volumes:
      - .:/app
    environment:
      DEBUG: "True"
      DJANGO_SECRET_KEY: "django-insecure-personliness-secret-key-for-development-only"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0"
      POSTGRES_DB: personliness
      POSTGRES_USER: personliness
      POSTGRES_PASSWORD: personliness
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/0"
      LLM_API_KEY: "${LLM_API_KEY}"
      LLM_MODEL: "o3"
    depends_on:
      - db
      - redis
    restart: unless-stopped

volumes:
  postgres_data:
